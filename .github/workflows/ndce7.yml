name: NDCe Windows Automation Setup
 
on:

  workflow_dispatch:
 
env:
  XFS_SIMULATOR_VERSION: '4.7.0'
  APTRA_ADVANCE_NDC_VERSION: '5.2.0'
  APTRA_ADVANCE_NDC_PATCH_BRANCH: ''
  EMV_VERSION: '5.0.0'
  NDC_ENTERPRISE_VERSION: 'andc52x-2.10.0-M01'
  AUTOMATION_BASE_TARF_VERSION: '1.1.6'
  CONNECTIONS_SERVER_URL: 'http://153.81.244.117:8092/connections'
  PROJECT_TYPE: 'Reference'
  AUTOMATION_NDC_ENTERPRISE_VERSION: '01.09.00Pre'
  TEST_SUITE: 'BuilderTestSuite/Functional/ClientEditorPortal/clientEditorandPortal.robot'
  BROWSER: 'chromium'
 
jobs:
  setup-and-test:
    name: NDCe Stack Deploy & Run Automation Tests
    # Use self-hosted runner for ATM stack installation (requires interactive desktop session)
    # Change to 'windows-latest' for GitHub-hosted runner (not recommended for APTRA installs)
    runs-on: windows-latest
 
    steps:
      - name: Checkout ndce-automation-tests
        uses: actions/checkout@v4
        #with:
        #  repository: ncratleos-swt-banking/ndce-automation-tests
        
          #ref: master
         # token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
 
      - name: Print deployment configuration
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "  NDCe Stack Deployment Configuration"
          Write-Host "========================================="
          Write-Host "Runner OS              : $env:OS - $((Get-CimInstance Win32_OperatingSystem).Caption)"
          Write-Host "XFS Simulator          : $env:XFS_SIMULATOR_VERSION"
          Write-Host "APTRA Advance NDC      : $env:APTRA_ADVANCE_NDC_VERSION"
          Write-Host "APTRA NDC Patch Branch : $env:APTRA_ADVANCE_NDC_PATCH_BRANCH"
          Write-Host "EMV Version            : $env:EMV_VERSION"
          Write-Host "NDC Enterprise         : $env:NDC_ENTERPRISE_VERSION"
          Write-Host "Automation Base TARF   : $env:AUTOMATION_BASE_TARF_VERSION"
          Write-Host "Connections Server URL  : $env:CONNECTIONS_SERVER_URL"
          Write-Host "Project Type           : $env:PROJECT_TYPE"
          Write-Host "Automation NDCe Version: $env:AUTOMATION_NDC_ENTERPRISE_VERSION"
          Write-Host "========================================="
 
      # -----------------------------------------------------------
      # 0. Install Prerequisites (Chocolatey, 7zip, NuGet, VC++)
      # -----------------------------------------------------------
      - name: Install prerequisites
        shell: pwsh
        run: |
          Write-Host "=== Installing prerequisites ==="
          choco install 7zip -y --no-progress
          New-Item -ItemType Directory -Force -Path "C:\.ansible\Packages" | Out-Null
 
      - name: Install APTRA Advance NDC
        shell: pwsh
        run: |
          ite-Host "=== Downloading APTRA Advance NDC $env:APTRA_ADVANCE_NDC_VERSION ==="
          upkgFile = "AdvanceNDC.$env:APTRA_ADVANCE_NDC_VERSION.nupkg"
          ownloadPath = "C:\.ansible\Packages\$nupkgFile"
          xtractPath = "C:\.ansible\Advance NDC $env:APTRA_ADVANCE_NDC_VERSION"
          rl = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"

          rl.exe --fail -L `
          -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" `
          -o $downloadPath `
          $url

           ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Download failed"; exit 1 }

          ite-Host "Downloaded package path:"
          ite-Host $downloadPath

          ileSize = (Get-Item $downloadPath).Length
          ite-Host "Downloaded file size: $fileSize bytes"

           ($fileSize -lt 1024) {
          Write-Host "ERROR: File too small"
          exit 1
          

          ite-Host "=== Extracting Advance NDC ==="
          w-Item -ItemType Directory -Force -Path $extractPath | Out-Null
          pand-Archive -Path $downloadPath -DestinationPath $extractPath -Force

          ite-Host "Top-level extracted contents:"
          t-ChildItem $extractPath |
          Select-Object Name, Length, LastWriteTime |
          Format-Table -AutoSize

          ite-Host "Locating setup.exe:"
          etupExe = Join-Path $extractPath "setup.exe"
          ite-Host "setup.exe path: $setupExe"
          ite-Host "Exists: $(Test-Path $setupExe)"

          ite-Host "=== Installing Advance NDC ==="
          roc = Start-Process `
          -FilePath $setupExe `
          -ArgumentList "/t:sst /u:silent" `
          -Wait `
          -PassThru

          alidCodes = @(0,1073741825,1073741826,1073741830,3010,1641)
           ($proc.ExitCode -notin $validCodes) {
          Write-Host "ERROR: Advance NDC install failed"
          exit 1
          

          ite-Host "Advance NDC installed successfully"

          ite-Host "=== Locating one Advance NDC executable ==="
          ndcExe = Get-ChildItem `
          -Path "C:\" `
          -Filter "*.exe" `
          -Recurse `
          -ErrorAction SilentlyContinue |
          Where-Object { $_.Name -match "andc|ndc|advance" } |
          Select-Object -First 1

           (-not $andcExe) {
          Write-Host "ERROR: No Advance NDC exe found"
          exit 1
          

          ite-Host "Advance NDC exe found:"
          ite-Host "Path : $($andcExe.FullName)"
          ite-Host "Size : $([Math]::Round($andcExe.Length / 1KB, 2)) KB"

          er = (Get-Item $andcExe.FullName).VersionInfo
          ite-Host "File version : $($ver.FileVersion)"
          ite-Host "Product ver. : $($ver.ProductVersion)"
