name: NDCe Windows Automation Setup
 
on:

  workflow_dispatch:
 
env:
  XFS_SIMULATOR_VERSION: '4.7.0'
  APTRA_ADVANCE_NDC_VERSION: '5.2.0'
  APTRA_ADVANCE_NDC_PATCH_BRANCH: ''
  EMV_VERSION: '5.0.0'
  NDC_ENTERPRISE_VERSION: 'andc52x-2.10.0-M01'
  AUTOMATION_BASE_TARF_VERSION: '1.1.6'
  CONNECTIONS_SERVER_URL: 'http://153.81.244.117:8092/connections'
  PROJECT_TYPE: 'Reference'
  AUTOMATION_NDC_ENTERPRISE_VERSION: '01.09.00Pre'
  TEST_SUITE: 'BuilderTestSuite/Functional/ClientEditorPortal/clientEditorandPortal.robot'
  BROWSER: 'chromium'
 
jobs:
  setup-and-test:
    name: NDCe Stack Deploy & Run Automation Tests
    runs-on: windows-latest
 
    steps:
      - name: Checkout ndce-automation-tests
        uses: actions/checkout@v4
      
 
      - name: Print deployment configuration
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "  NDCe Stack Deployment Configuration"
          Write-Host "========================================="
          Write-Host "Runner OS              : $env:OS - $((Get-CimInstance Win32_OperatingSystem).Caption)"
          Write-Host "XFS Simulator          : $env:XFS_SIMULATOR_VERSION"
          Write-Host "APTRA Advance NDC      : $env:APTRA_ADVANCE_NDC_VERSION"
          Write-Host "APTRA NDC Patch Branch : $env:APTRA_ADVANCE_NDC_PATCH_BRANCH"
          Write-Host "EMV Version            : $env:EMV_VERSION"
          Write-Host "NDC Enterprise         : $env:NDC_ENTERPRISE_VERSION"
          Write-Host "Automation Base TARF   : $env:AUTOMATION_BASE_TARF_VERSION"
          Write-Host "Connections Server URL  : $env:CONNECTIONS_SERVER_URL"
          Write-Host "Project Type           : $env:PROJECT_TYPE"
          Write-Host "Automation NDCe Version: $env:AUTOMATION_NDC_ENTERPRISE_VERSION"
          Write-Host "========================================="
 
      # -----------------------------------------------------------
      # 0. Install Prerequisites (Chocolatey, 7zip, NuGet, VC++)
      # -----------------------------------------------------------
      - name: Install prerequisites
        shell: pwsh
        run: |
          Write-Host "=== Installing prerequisites ==="
          choco install 7zip -y --no-progress
          New-Item -ItemType Directory -Force -Path "C:\.ansible\Packages" | Out-Null
 
      # -----------------------------------------------------------
      # 1. Install NDCe Stack Components
      # -----------------------------------------------------------
 
      - name: Install XFS Simulator
        shell: pwsh
        run: |
          Write-Host "=== Downloading XFS Simulator $env:XFS_SIMULATOR_VERSION ==="
          $nupkgFile = "XFSSimulator.$env:XFS_SIMULATOR_VERSION.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
          curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "C:\.ansible\Packages\$nupkgFile" $url
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Download failed with exit code $LASTEXITCODE"
            exit 1
          }
          $fileSize = (Get-Item "C:\.ansible\Packages\$nupkgFile").Length
          Write-Host "Downloaded file size: $fileSize bytes"
          if ($fileSize -lt 1024) {
            Write-Host "ERROR: Downloaded file is too small ($fileSize bytes) — likely an error response:"
            Get-Content "C:\.ansible\Packages\$nupkgFile"
            exit 1
          }
          Write-Host "=== Extracting nupkg ==="
          New-Item -ItemType Directory -Force -Path "C:\.ansible\XFS Simulator" | Out-Null
          Expand-Archive -Path "C:\.ansible\Packages\$nupkgFile" -DestinationPath "C:\.ansible\XFS Simulator" -Force
          Write-Host "=== Installing XFS Simulator (setup.exe /t:devsim /u:silent) ==="
          $proc = Start-Process -FilePath "C:\.ansible\XFS Simulator\setup.exe" -ArgumentList "/t:devsim /u:silent" -Wait -PassThru
          $validCodes = @(0, 1073741825, 1073741826, 1073741830, 3010, 1641)
          if ($proc.ExitCode -notin $validCodes) {
            Write-Host "ERROR: XFS Simulator install failed with exit code $($proc.ExitCode)"
            exit 1
          }
          Write-Host "XFS Simulator installed (exit code: $($proc.ExitCode))"
      - name: Install APTRA Advance NDC
        shell: pwsh
        run: |
          Write-Host "=== Downloading APTRA Advance NDC $env:APTRA_ADVANCE_NDC_VERSION ==="
          $nupkgFile = "AdvanceNDC.$env:APTRA_ADVANCE_NDC_VERSION.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
          curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "C:\.ansible\Packages\$nupkgFile" $url
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Download failed"; exit 1 }
          $fileSize = (Get-Item "C:\.ansible\Packages\$nupkgFile").Length
          if ($fileSize -lt 1024) {
            Write-Host "ERROR: File too small ($fileSize bytes):"; Get-Content "C:\.ansible\Packages\$nupkgFile"; exit 1
          }
          Write-Host "=== Extracting and installing Advance NDC ==="

          $logRoot = "C:\.ansible\Logs"
          New-Item -ItemType Directory -Force -Path $logRoot | Out-Null
          $ts = Get-Date -Format "yyyyMMdd_HHmmss"          

          $andcTranscript = "$logRoot\AdvanceNDC_Install_Transcript_$ts.log"
          Start-Transcript -Path $andcTranscript -Append | Out-Null          

          $extractPath = "C:\.ansible\Advance NDC $env:APTRA_ADVANCE_NDC_VERSION"
          New-Item -ItemType Directory -Force -Path $extractPath | Out-Null          

          Expand-Archive -Path "C:\.ansible\Packages\$nupkgFile" -DestinationPath $extractPath -Force          

          Write-Host "Advance NDC installer started at $(Get-Date)"
          Write-Host "Live progress will be shown below..."
          Write-Host "--------------------------------------------------"          

          # Start installer WITHOUT -Wait so we can monitor it
          $proc = Start-Process `
            -FilePath "$extractPath\setup.exe" `
            -ArgumentList "/t:sst /u:silent" `
            -PassThru          

          # LIVE MONITORING LOOP
          while (-not $proc.HasExited) {          

            $p = Get-Process -Id $proc.Id -ErrorAction SilentlyContinue          

            if ($p) {
              Write-Host ("[{0}] Advance NDC installing | CPU: {1:N1} | RAM: {2:N1} MB" -f `
                (Get-Date -Format HH:mm:ss),
                $p.CPU,
                ($p.WorkingSet64 / 1MB))
            } else {
              Write-Host ("[{0}] Installer process initializing..." -f `
                (Get-Date -Format HH:mm:ss))
            }          

            # Show real file activity proof
            if (Test-Path "C:\Program Files (x86)\NCR APTRA") {
              $recent = Get-ChildItem "C:\Program Files (x86)\NCR APTRA" -Recurse -ErrorAction SilentlyContinue |
                        Sort-Object LastWriteTime -Descending |
                        Select-Object -First 1
              if ($recent) {
                Write-Host ("    Last file updated: {0} at {1}" -f `
                  $recent.FullName, $recent.LastWriteTime)
              }
            }          

            Start-Sleep -Seconds 15
          }          

          $proc.WaitForExit()          

          $validCodes = @(0, 1073741825, 1073741826, 1073741830, 3010, 1641)
          if ($proc.ExitCode -notin $validCodes) {
            Write-Host "ERROR: Advance NDC install failed with exit code $($proc.ExitCode)"
            Stop-Transcript
            exit 1
          }          

          Write-Host "Advance NDC installed successfully (exit code: $($proc.ExitCode))"
          Stop-Transcript          

                         
