name: NDCe Windows Automation Setup
 
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
 
env:
  XFS_SIMULATOR_VERSION: '4.7.0'
  APTRA_ADVANCE_NDC_VERSION: '5.2.0'
  APTRA_ADVANCE_NDC_PATCH_BRANCH: ''
  EMV_VERSION: '5.0.0'
  NDC_ENTERPRISE_VERSION: 'andc52x-2.10.0-M01'
  AUTOMATION_BASE_TARF_VERSION: '1.1.6'
  CONNECTIONS_SERVER_URL: 'http://153.81.244.117:8092/connections'
  PROJECT_TYPE: 'Reference'
  AUTOMATION_NDC_ENTERPRISE_VERSION: '01.09.00Pre'
  TEST_SUITE: 'BuilderTestSuite/Functional/ClientEditorPortal/clientEditorandPortal.robot'
  BROWSER: 'chromium'
 
jobs:
  setup-and-test:
    name: NDCe Stack Deploy & Run Automation Tests
    runs-on: windows-latest
 
    steps:
      - name: Checkout ndce-automation-tests
        uses: actions/checkout@v4
        #with:
          #repository: ncratleos-swt-banking/ndce-automation-tests
         # ref: master
         # token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
 
      - name: Print deployment configuration
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "  NDCe Stack Deployment Configuration"
          Write-Host "========================================="
          Write-Host "Runner OS              : $env:OS - $((Get-CimInstance Win32_OperatingSystem).Caption)"
          Write-Host "XFS Simulator          : $env:XFS_SIMULATOR_VERSION"
          Write-Host "APTRA Advance NDC      : $env:APTRA_ADVANCE_NDC_VERSION"
          Write-Host "APTRA NDC Patch Branch : $env:APTRA_ADVANCE_NDC_PATCH_BRANCH"
          Write-Host "EMV Version            : $env:EMV_VERSION"
          Write-Host "NDC Enterprise         : $env:NDC_ENTERPRISE_VERSION"
          Write-Host "Automation Base TARF   : $env:AUTOMATION_BASE_TARF_VERSION"
          Write-Host "Connections Server URL  : $env:CONNECTIONS_SERVER_URL"
          Write-Host "Project Type           : $env:PROJECT_TYPE"
          Write-Host "Automation NDCe Version: $env:AUTOMATION_NDC_ENTERPRISE_VERSION"
          Write-Host "========================================="
 
      # -----------------------------------------------------------
      # 0. Install Prerequisites (Chocolatey, 7zip, NuGet, VC++)
      # -----------------------------------------------------------
      - name: Install prerequisites
        shell: pwsh
        run: |
          Write-Host "=== Installing prerequisites ==="
          choco install 7zip -y --no-progress
          New-Item -ItemType Directory -Force -Path "C:\.ansible\Packages" | Out-Null
 
      # -----------------------------------------------------------
      # 1. Install NDCe Stack Components
      # -----------------------------------------------------------
 
      - name: Install XFS Simulator
        shell: pwsh
        run: |
          Write-Host "=== Downloading XFS Simulator $env:XFS_SIMULATOR_VERSION ==="
          $nupkgFile = "XFSSimulator.$env:XFS_SIMULATOR_VERSION.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
          curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "C:\.ansible\Packages\$nupkgFile" $url
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Download failed with exit code $LASTEXITCODE"
            exit 1
          }
          $fileSize = (Get-Item "C:\.ansible\Packages\$nupkgFile").Length
          Write-Host "Downloaded file size: $fileSize bytes"
          if ($fileSize -lt 1024) {
            Write-Host "ERROR: Downloaded file is too small ($fileSize bytes) — likely an error response:"
            Get-Content "C:\.ansible\Packages\$nupkgFile"
            exit 1
          }
          Write-Host "=== Extracting nupkg ==="
          New-Item -ItemType Directory -Force -Path "C:\.ansible\XFS Simulator" | Out-Null
          Expand-Archive -Path "C:\.ansible\Packages\$nupkgFile" -DestinationPath "C:\.ansible\XFS Simulator" -Force
          Write-Host "=== Installing XFS Simulator (setup.exe /t:devsim /u:silent) ==="
          $proc = Start-Process -FilePath "C:\.ansible\XFS Simulator\setup.exe" -ArgumentList "/t:devsim /u:silent" -Wait -PassThru
          $validCodes = @(0, 1073741825, 1073741826, 1073741830, 3010, 1641)
          if ($proc.ExitCode -notin $validCodes) {
            Write-Host "ERROR: XFS Simulator install failed with exit code $($proc.ExitCode)"
            exit 1
          }
          Write-Host "XFS Simulator installed (exit code: $($proc.ExitCode))"
      - name: Install APTRA Advance NDC
    shell: pwsh
    run: |
      Write-Host "=== Downloading APTRA Advance NDC $env:APTRA_ADVANCE_NDC_VERSION ==="

      $nupkgFile = "AdvanceNDC.$env:APTRA_ADVANCE_NDC_VERSION.nupkg"
      $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
      curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" `
        -o "C:\.ansible\Packages\$nupkgFile" $url

      if ($LASTEXITCODE -ne 0) {
        Write-Host "ERROR: Download failed"
        exit 1
      }

      $extractPath = "C:\.ansible\Advance NDC $env:APTRA_ADVANCE_NDC_VERSION"
      New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
      Expand-Archive "C:\.ansible\Packages\$nupkgFile" $extractPath -Force

      $logFile = "C:\temp\AdvanceNDC-install.log"
      New-Item -ItemType File -Force -Path $logFile | Out-Null

      Write-Host "=== Starting APTRA Advance NDC installation with live log output ==="

      # Start installer
      $proc = Start-Process `
        -FilePath "$extractPath\setup.exe" `
        -ArgumentList "/t:sst /u:silent REBOOT=ReallySuppress /lvx `"$logFile`"" `
        -PassThru

      # Stream log contents LIVE to console
      Write-Host "=== Streaming installer log output ==="
      $logPosition = 0

      while (-not $proc.HasExited) {
        if (Test-Path $logFile) {
          $length = (Get-Item $logFile).Length
          if ($length -gt $logPosition) {
            $fs = New-Object IO.FileStream($logFile, 'Open', 'Read', 'ReadWrite')
            $fs.Seek($logPosition, 'Begin') | Out-Null
            $sr = New-Object IO.StreamReader($fs)
            while (-not $sr.EndOfStream) {
              $line = $sr.ReadLine()
              if ($line -and $line.Trim() -ne "") {
                Write-Host "[APTRA] $line"
              }
            }
            $logPosition = $fs.Position
            $sr.Close()
            $fs.Close()
          }
        }
        Start-Sleep -Seconds 5
      }

      # Final validation
      $validCodes = @(0, 1073741825, 1073741826, 1073741830, 3010, 1641)

      Write-Host "=== APTRA installer completed, dumping last log lines ==="
      Get-Content $logFile -Tail 50

      if ($proc.ExitCode -notin $validCodes) {
        Write-Host "ERROR: Advance NDC install failed with exit code $($proc.ExitCode)"
        exit 1
      }

      Write-Host "Advance NDC installed successfully (exit code: $($proc.ExitCode))"

        - name: Apply APTRA Advance NDC Patches
          if: env.APTRA_ADVANCE_NDC_PATCH_BRANCH != ''
          shell: pwsh
          run: |
            Write-Host "=== Applying APTRA Advance NDC Patches (branch: $env:APTRA_ADVANCE_NDC_PATCH_BRANCH) ==="
            $ver = $env:APTRA_ADVANCE_NDC_VERSION
            $branch = $env:APTRA_ADVANCE_NDC_PATCH_BRANCH
            # Map version to JFrog patch URLs
            $patchUrls = @{
              "5.1.0" = @{
                "customer" = @(
                  "https://ncratleos.jfrog.io/artifactory/andc-generic-releases/ANDCASM_0301XX_Custver/",
                  "https://ncratleos.jfrog.io/artifactory/andc-generic-releases/ANDC_0301XX_Custver/"
                )
                "developer" = @(
                  "https://ncratleos.jfrog.io/artifactory/andc-generic-releases/ANDCASM_0301XX_DevBranch/",
                  "https://ncratleos.jfrog.io/artifactory/andc-generic-releases/ANDC_0301XX_DevBranch/"
                )
              }
              "5.2.0" = @{
                "customer" = @(
                  "https://ncratleos.jfrog.io/artifactory/andc-generic-releases/ANDCASM_0302XX_Custver/",
                  "https://ncratleos.jfrog.io/artifactory/andc-generic-releases/ANDC_0302XX_Custver/"
                )
                "developer" = @(
                  "https://ncratleos.jfrog.io/artifactory/andc-generic-releases/ANDCASM_0302XX_DevBranch/",
                  "https://ncratleos.jfrog.io/artifactory/andc-generic-releases/ANDC_0302XX_DevBranch/"
                )
              }
            }
            if (-not $patchUrls.ContainsKey($ver)) {
              Write-Host "ERROR: No patch URLs configured for ANDC version $ver"; exit 1
            }
            if (-not $patchUrls[$ver].ContainsKey($branch)) {
              Write-Host "ERROR: Unknown branch '$branch'. Use 'customer' or 'developer'"; exit 1
            }
            $urls = $patchUrls[$ver][$branch]
          New-Item -ItemType Directory -Force -Path "C:\.ansible\Packages\.Net" | Out-Null
          New-Item -ItemType Directory -Force -Path "C:\.ansible\Packages\CPP" | Out-Null
          $patchBase = "C:\.ansible\Advance NDC $ver Patches"
          New-Item -ItemType Directory -Force -Path "$patchBase\.Net $branch build" | Out-Null
          New-Item -ItemType Directory -Force -Path "$patchBase\CPP $branch build" | Out-Null
          $validCodes = @(0, 1073741825, 1073741826, 1073741830, 3010, 1641)
 
          # Helper: get latest .zip from JFrog directory listing
          function Get-LatestPatch($dirUrl) {
            $resp = curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -s $dirUrl
            $matches = [regex]::Matches($resp, '<a href="([^"]+\.zip)">')
            if ($matches.Count -eq 0) { Write-Host "ERROR: No patches found at $dirUrl"; exit 1 }
            return $matches[$matches.Count - 1].Groups[1].Value
          }
 
          # .Net patch
          $dotNetPatch = Get-LatestPatch $urls[0]
          Write-Host "Latest .Net patch: $dotNetPatch"
          curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "C:\.ansible\Packages\.Net\$dotNetPatch" "$($urls[0])$dotNetPatch"
          Expand-Archive -Path "C:\.ansible\Packages\.Net\$dotNetPatch" -DestinationPath "$patchBase\.Net $branch build" -Force
          $msi = Get-ChildItem -Path "$patchBase\.Net $branch build" -Recurse -Filter "ANDCASMPatch.msi" | Select-Object -First 1
          if ($msi) {
            $proc = Start-Process msiexec.exe -ArgumentList "/i `"$($msi.FullName)`" TARGETTYPE=`"Runtime`" REINSTALLMODE=amus ARPSYSTEMCOMPONENT=1 REBOOT=Suppress TARGETDIR=`"C:\Program Files\NCR APTRA\Advance NDC`" CONFIGURATIONSET=`"<CONFIGSET>`" /quiet" -Wait -PassThru
            if ($proc.ExitCode -notin $validCodes) { Write-Host "ERROR: .Net patch install failed ($($proc.ExitCode))"; exit 1 }
            Write-Host ".Net patch installed (exit code: $($proc.ExitCode))"
          }
 
          # CPP patch
          $cppPatch = Get-LatestPatch $urls[1]
          Write-Host "Latest CPP patch: $cppPatch"
          curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "C:\.ansible\Packages\CPP\$cppPatch" "$($urls[1])$cppPatch"
          Expand-Archive -Path "C:\.ansible\Packages\CPP\$cppPatch" -DestinationPath "$patchBase\CPP $branch build" -Force
          $msi = Get-ChildItem -Path "$patchBase\CPP $branch build" -Recurse -Filter "ANDCPatch.msi" | Select-Object -First 1
          if ($msi) {
            $proc = Start-Process msiexec.exe -ArgumentList "/i `"$($msi.FullName)`" TARGETTYPE=`"RuntimeSST`" REINSTALLMODE=amus ARPSYSTEMCOMPONENT=1 REBOOT=Suppress INSTALLDIR=`"C:\Program Files\NCR APTRA\Advance NDC`" CONFIGURATIONSET=`"<CONFIGSET>`" ALLUSERS=2 /quiet" -Wait -PassThru
            if ($proc.ExitCode -notin $validCodes) { Write-Host "ERROR: CPP patch install failed ($($proc.ExitCode))"; exit 1 }
            Write-Host "CPP patch installed (exit code: $($proc.ExitCode))"
          }
 
          # Copy UpdatedConfig files to Config
          $updatedConfig = "C:\Program Files (x86)\NCR APTRA\Advance NDC\UpdatedConfig"
          $configDir = "C:\Program Files (x86)\NCR APTRA\Advance NDC\Config"
          if (Test-Path $updatedConfig) {
            Get-ChildItem -Path $updatedConfig -Recurse -File | Where-Object { $_.Extension -ne '.png' -and $_.Name -ne 'USERFUNS.SCR' } | ForEach-Object {
              Copy-Item $_.FullName -Destination $configDir -Force -ErrorAction SilentlyContinue
            }
            $userfuns = Join-Path $updatedConfig "USERFUNS.SCR"
            if (Test-Path $userfuns) {
              Copy-Item $userfuns -Destination "C:\Program Files (x86)\NCR APTRA\Advance NDC\USERFUNS.SCR" -Force
            }
          }
          Write-Host "APTRA Advance NDC Patches applied successfully"
 
      - name: Install EMV
        shell: pwsh
        run: |
          Write-Host "=== Downloading EMV $env:EMV_VERSION ==="
          $nupkgFile = "EMVAdvanceNDC.$env:EMV_VERSION.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
          curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "C:\.ansible\Packages\$nupkgFile" $url
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Download failed"; exit 1 }
          $fileSize = (Get-Item "C:\.ansible\Packages\$nupkgFile").Length
          if ($fileSize -lt 1024) {
            Write-Host "ERROR: File too small ($fileSize bytes):"; Get-Content "C:\.ansible\Packages\$nupkgFile"; exit 1
          }
          $extractPath = "C:\.ansible\EMV-CAM2 Exits for Advance NDC $env:EMV_VERSION"
          New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
          Expand-Archive -Path "C:\.ansible\Packages\$nupkgFile" -DestinationPath $extractPath -Force
          Write-Host "=== Installing EMV via msiexec ==="
          $proc = Start-Process msiexec.exe -ArgumentList "/i `"$extractPath\EMVExMV.msi`" /qn /norestart /lv `"$extractPath\install.log`" ARPSYSTEMCOMPONENT=1 TARGETTYPE=`"RuntimeSST`" ALLUSERS=2" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Host "ERROR: EMV install failed with exit code $($proc.ExitCode)"
            if (Test-Path "$extractPath\install.log") { Get-Content "$extractPath\install.log" -Tail 50 }
            exit 1
          }
          Write-Host "EMV installed (exit code: $($proc.ExitCode))"
 
      - name: Install NDC Enterprise
        shell: pwsh
        run: |
          Write-Host "=== Downloading NDC Enterprise $env:NDC_ENTERPRISE_VERSION ==="
          $ver = $env:NDC_ENTERPRISE_VERSION
          # Determine download URL based on version pattern
          # Released .cab versions: e.g. "02.05.00", "02.08.00"
          # Snapshot .zip versions: e.g. "andc52x-2.10.0-M01"
          # RC .zip versions: e.g. "andc52x-2.8.1-RC1"
          if ($ver -match '^andc(\d+x)-(.+)$') {
            $andcVer = $Matches[1]
            $numVer = $Matches[2]
            if ($numVer -match 'RC') {
              $url = "https://ncratleos.jfrog.io/artifactory/ndce-maven-releases/com/ncr/ndce/terminal/ndce-sst-aggregate-for-andc$%7BandcVer%7D/$%7BnumVer%7D/ndce-sst-aggregate-for-andc$%7BandcVer%7D-$%7BnumVer%7D.zip%22
              $fileName = "ndce-sst-aggregate-for-andc${andcVer}-${numVer}.zip"
            } else {
              $url = "https://ncratleos.jfrog.io/artifactory/ndce-maven-snapshots/com/ncr/ndce/terminal/ndce-sst-aggregate-for-andc$%7BandcVer%7D/$%7BnumVer%7D-SNAPSHOT/ndce-sst-aggregate-for-andc$%7BandcVer%7D-$%7BnumVer%7D-SNAPSHOT.zip%22
              $fileName = "ndce-sst-aggregate-for-andc${andcVer}-${numVer}-SNAPSHOT.zip"
            }
          } else {
            # Released cab format (legacy): version like "02.07.00" defaults to andc-51x
            $url = "https://ncratleos.jfrog.io/artifactory/atmclient-maven-releases/NDCEnterprise/Released/Aggregates/NDCEnterprise_SST_Runtime-andc-51x/$%7Bver%7D/NDCEnterprise_SST_Runtime-andc-51x-$%7Bver%7D.cab%22
            $fileName = "NDCEnterprise_SST_Runtime-andc-51x-${ver}.cab"
          }
          Write-Host "Download URL: $url"
          curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "C:\.ansible\Packages\$fileName" $url
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Download failed"; exit 1 }
          $fileSize = (Get-Item "C:\.ansible\Packages\$fileName").Length
          if ($fileSize -lt 1024) {
            Write-Host "ERROR: File too small ($fileSize bytes):"; Get-Content "C:\.ansible\Packages\$fileName"; exit 1
          }
          $extractPath = "C:\.ansible\NDC Enterprise $ver"
          New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
          if ($fileName -match '\.cab$') {
            & expand "C:\.ansible\Packages\$fileName" -F:* $extractPath
          } else {
            Expand-Archive -Path "C:\.ansible\Packages\$fileName" -DestinationPath $extractPath -Force
          }
          Write-Host "=== Installing NDC Enterprise (setup.exe /t:sst /u:silent) ==="
          $proc = Start-Process -FilePath "$extractPath\setup.exe" -ArgumentList "/t:sst /u:silent" -Wait -PassThru
          $validCodes = @(0, 1073741825, 1073741826, 1073741830, 3010, 1641)
          if ($proc.ExitCode -notin $validCodes) {
            Write-Host "ERROR: NDC Enterprise install failed with exit code $($proc.ExitCode)"; exit 1
          }
          Write-Host "NDC Enterprise installed (exit code: $($proc.ExitCode))"
 
      - name: Install Automation Base TARF
        shell: pwsh
        run: |
          Write-Host "=== Installing Automation Base TARF $env:AUTOMATION_BASE_TARF_VERSION ==="
          $jfrogBase = "https://ncratleos.jfrog.io/artifactory/tarf-maven-releases/com/ncr"
          $tarfPath = "C:\TARF\libraries"
          New-Item -ItemType Directory -Force -Path $tarfPath | Out-Null
          New-Item -ItemType Directory -Force -Path "C:\.ansible\Packages" | Out-Null
 
          # TARF artifact configuration for version 1.1.6
          $artifacts = @(
            @{ name = "vc_redist.x86"; version = "2017"; ext = ".zip" },
            @{ name = "aptrasimrobot"; version = "01.01.06"; ext = ".zip" },
            @{ name = "python"; version = "3.8.3-amd64"; ext = ".zip" },
            @{ name = "xfssimulator"; version = "94.04.00.11"; ext = ".zip" },
            @{ name = "testprojecttemplate"; version = "01.01.05"; ext = ".zip" },
            @{ name = "ndchostrobot"; version = "0.0.1"; ext = ".zip" },
            @{ name = "sdfparserrobot"; version = "0.0.1"; ext = ".zip" }
          )
 
          foreach ($art in $artifacts) {
            $fileName = "$($art.name)-$($art.version)$($art.ext)"
            $url = "$jfrogBase/$($art.name)/$($art.version)/$fileName"
            Write-Host "Downloading $fileName ..."
            curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "C:\.ansible\Packages\$fileName" $url
            if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Download failed for $fileName"; exit 1 }
            $destDir = "$tarfPath\$($art.name)-$($art.version)"
            New-Item -ItemType Directory -Force -Path $destDir | Out-Null
            Expand-Archive -Path "C:\.ansible\Packages\$fileName" -DestinationPath $destDir -Force
            Write-Host "Extracted $fileName to $destDir"
          }
 
          # Install VC++ Redistributable
          Write-Host "=== Installing VC++ Redistributable ==="
          $vcExe = "$tarfPath\vc_redist.x86-2017\VC_redist.x86.exe"
          if (Test-Path $vcExe) {
            $proc = Start-Process -FilePath $vcExe -ArgumentList "/s /quiet" -Wait -PassThru
            if ($proc.ExitCode -notin @(0, 1638)) {
              Write-Host "WARNING: VC++ install returned exit code $($proc.ExitCode)"
            }
            Write-Host "VC++ Redistributable installed (exit code: $($proc.ExitCode))"
          } else {
            Write-Host "WARNING: VC_redist.x86.exe not found at $vcExe"
          }
 
          # Install Python packages (robotframework, winregistry, etc.)
          Write-Host "=== Installing TARF Python packages ==="
          pip install robotframework==7.3.1 winregistry beautifulsoup4==4.9.3 lxml robotframework-jsonlibrary robotframework-requests
          Write-Host "TARF installation complete"
 
      - name: Install Automation for NDC Enterprise
        shell: pwsh
        run: |
          Write-Host "=== Downloading NDC Automation $env:AUTOMATION_NDC_ENTERPRISE_VERSION ==="
          $ver = $env:AUTOMATION_NDC_ENTERPRISE_VERSION
          $nupkgFile = "NDCAutomation${ver}Release.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
          curl.exe --fail -L -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" -o "C:\.ansible\Packages\$nupkgFile" $url
          if ($LASTEXITCODE -ne 0) { Write-Host "ERROR: Download failed"; exit 1 }
          $fileSize = (Get-Item "C:\.ansible\Packages\$nupkgFile").Length
          if ($fileSize -lt 1024) {
            Write-Host "ERROR: File too small ($fileSize bytes):"; Get-Content "C:\.ansible\Packages\$nupkgFile"; exit 1
          }
          $extractPath = "C:\.ansible\ANDCAutomation $ver"
          New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
          Expand-Archive -Path "C:\.ansible\Packages\$nupkgFile" -DestinationPath $extractPath -Force
          Write-Host "=== Installing NDC Automation via msiexec ==="
          $proc = Start-Process msiexec.exe -ArgumentList "/i `"$extractPath\ANDCAutomation.msi`" /qn /lp `"$extractPath\startupactions.log`" BUTTON2=1" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Host "ERROR: NDC Automation install failed with exit code $($proc.ExitCode)"; exit 1
          }
          Write-Host "NDC Automation installed (exit code: $($proc.ExitCode))"
 
      # -----------------------------------------------------------
      # 1b. Post-Installation Configuration
      # -----------------------------------------------------------
      - name: Configure NDCe stack post-installation
        shell: pwsh
        run: |
          Write-Host "=== Running post-installation configuration ==="
 
          # Enable MSMQ
          Write-Host "Enabling MSMQ..."
          DISM /online /enable-feature /featurename:MSMQ-Container /norestart
 
          # Registry: AutomationEnabled
          Write-Host "Setting AutomationEnabled registry key..."
          New-Item -Path "HKLM:\SOFTWARE\WOW6432Node\NCR\APTRA\Automation" -Force | Out-Null
          Set-ItemProperty -Path "HKLM:\SOFTWARE\WOW6432Node\NCR\APTRA\Automation" -Name "AutomationEnabled" -Value 1 -Type DWord
 
          # Registry: SetPhysicalCounts for CashHandler
          Write-Host "Setting SetPhysicalCounts registry key..."
          New-Item -Path "HKLM:\SOFTWARE\WOW6432Node\NCR\Advance NDC\CashHandler" -Force | Out-Null
          Set-ItemProperty -Path "HKLM:\SOFTWARE\WOW6432Node\NCR\Advance NDC\CashHandler" -Name "SetPhysicalCounts" -Value 1 -Type DWord
 
          # Update printer aliases
          Write-Host "Updating printer aliases..."
          New-Item -Path "HKLM:\SOFTWARE\WOW6432Node\NCR\Advance NDC\Aliases" -Force | Out-Null
          Set-ItemProperty -Path "HKLM:\SOFTWARE\WOW6432Node\NCR\Advance NDC\Aliases" -Name "Journal Printer" -Value "JournalPrinter1" -Type String
          Set-ItemProperty -Path "HKLM:\SOFTWARE\WOW6432Node\NCR\Advance NDC\Aliases" -Name "Receipt Printer" -Value "ReceiptPrinter1" -Type String
 
          # Import registry files from Configuration folder
          $configSrc = "${{ github.workspace }}\Configuration"
          if (Test-Path "$configSrc\simchipio") {
            Write-Host "Copying simchipio to C:\..."
            Copy-Item -Path "$configSrc\simchipio" -Destination "C:\simchipio" -Recurse -Force
            if (Test-Path "C:\simchipio\Reg_CSimChipIOWin64.reg") {
              reg import "C:\simchipio\Reg_CSimChipIOWin64.reg" /reg:64 2>&1
            }
          }
 
          # Import additional registry files
          $regFiles = @("RebootOnException.reg", "LocalDataAvaialble.reg", "MDMMigration.reg", "PhysicalCassettes.reg", "WosaLevelCurrency.reg")
          foreach ($reg in $regFiles) {
            $regPath = "$configSrc\$reg"
            if (Test-Path $regPath) {
              Write-Host "Importing $reg..."
              reg import $regPath /reg:32 2>&1
            }
          }
 
          # Copy Configuration folder to C:\
          if (Test-Path $configSrc) {
            Write-Host "Copying Configuration folder to C:\..."
            Copy-Item -Path $configSrc -Destination "C:\Configuration" -Recurse -Force
          }
 
          # Import AdvanceNDC.reg
          $andcReg = "C:\Program Files (x86)\NCR APTRA\Advance NDC\Config\AdvanceNDC.reg"
          if (Test-Path $andcReg) {
            Write-Host "Importing AdvanceNDC.reg..."
            reg import $andcReg /reg:32 2>&1
          }
 
          # Copy TransFuncids.txt to Config
          $transFuncids = "$configSrc\TransFuncids.txt"
          if (Test-Path $transFuncids) {
            Copy-Item $transFuncids -Destination "C:\Program Files (x86)\NCR APTRA\Advance NDC\Config\" -Force
          }
 
          Write-Host "Post-installation configuration complete"
 
      - name: Configure Connections Server
        shell: pwsh
        run: |
          Write-Host "=== Configuring Connections Server ==="
          $agentProps = "C:\Program Files (x86)\NCR APTRA\connections-agent\settings\agent.properties"
          if (Test-Path $agentProps) {
            $content = Get-Content $agentProps -Raw
            $content = $content -replace 'connections\.server\.url=.*', "connections.server.url= $env:CONNECTIONS_SERVER_URL"
            Set-Content -Path $agentProps -Value $content
            Write-Host "Updated Connections Server URL to: $env:CONNECTIONS_SERVER_URL"
          } else {
            Write-Host "WARNING: agent.properties not found at $agentProps"
          }
 
          # Configure ServiceName for Reference project
          if ($env:PROJECT_TYPE -eq "Reference") {
            $connTable = "C:\Program Files (x86)\NCR APTRA\Advance NDC\Config\ConnectionsTable.xml"
            if (Test-Path $connTable) {
              [xml]$xml = Get-Content $connTable
              $node = $xml.SelectSingleNode("//ConnectionsStateConfigurations/BrowserStart")
              if ($node) {
                $node.SetAttribute("ServiceName", "modesMonitor")
                $xml.Save($connTable)
                Write-Host "Set ServiceName to modesMonitor for Reference project"
              }
            }
          }
 
      - name: Verify NDCe stack deployment
        shell: pwsh
        run: |
          Write-Host "=== Verifying NDCe Stack Deployment ==="
          $paths = @(
            "C:\Program Files (x86)\NCR APTRA\Advance NDC",
            "C:\Program Files (x86)\NCR APTRA\connections-agent",
            "C:\TARF\libraries"
          )
          foreach ($p in $paths) {
            if (Test-Path $p) { Write-Host "[OK] $p exists" }
            else { Write-Host "[MISSING] $p not found" }
          }
          Get-Service | Where-Object { $_.Name -match 'NCR|XFS|APTRA|NDC' } | Format-Table Name, Status -AutoSize
 
      # -----------------------------------------------------------
      # 2. Run Automation Tests
      # -----------------------------------------------------------
      - name: Download Allure CLI
        run: |
          curl -L -o allure-2.27.0.zip https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.zip
          powershell -Command "Expand-Archive -Path allure-2.27.0.zip -DestinationPath allure"
        shell: cmd
 
      - name: Run Robot Framework tests
        run: |
          echo "=== Running test suite: %TEST_SUITE% ==="
          robot --outputdir results --listener allure_robotframework;results/allure %TEST_SUITE%
        shell: cmd
 
      - name: Generate Allure HTML report
        if: always()
        run: |
          allure\allure-2.27.0\bin\allure.bat generate results/allure -o results/allure-report --clean
        shell: cmd
 
      - name: Post test result counts as annotation
        if: always()
        shell: pwsh
        run: |
          $xmlPath = "results/output.xml"
          if (-not (Test-Path $xmlPath)) {
            Write-Host "::warning title=No Results::output.xml not found — tests may not have run."
            exit 0
          }
          [xml]$doc = Get-Content $xmlPath
          $pass = ($doc.SelectNodes("//test/status[@status='PASS']")).Count
          $fail = ($doc.SelectNodes("//test/status[@status='FAIL']")).Count
          $skip = ($doc.SelectNodes("//test/status[@status='SKIP']")).Count
          $total = $pass + $fail + $skip
          $sev = if ($fail -gt 0) { "error" } else { "notice" }
          Write-Host "::${sev} title=Robot Test Results::Total $total | Passed: $pass | Failed: $fail | Skipped: $skip"
 
      # -----------------------------------------------------------
      # 5. Upload Artifacts
      # -----------------------------------------------------------
      - name: Upload Robot Framework reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-reports
          path: results/
 
      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-report
          path: results/allure-report/
 
