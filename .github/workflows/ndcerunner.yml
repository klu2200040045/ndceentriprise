name: NDCe Windows Automation Setup
 
on:

  workflow_dispatch:
 
env:
  XFS_SIMULATOR_VERSION: '4.7.0'
  APTRA_ADVANCE_NDC_VERSION: '5.2.0'
  APTRA_ADVANCE_NDC_PATCH_BRANCH: ''
  EMV_VERSION: '5.0.0'
  NDC_ENTERPRISE_VERSION: 'andc52x-2.10.0-M01'
  AUTOMATION_BASE_TARF_VERSION: '1.1.6'
  CONNECTIONS_SERVER_URL: 'http://153.81.244.117:8092/connections'
  PROJECT_TYPE: 'Reference'
  AUTOMATION_NDC_ENTERPRISE_VERSION: '01.09.00Pre'
  TEST_SUITE: 'BuilderTestSuite/Functional/ClientEditorPortal/clientEditorandPortal.robot'
  BROWSER: 'chromium'
 
jobs:
  setup-and-test:
    name: NDCe Stack Deploy & Run Automation Tests
    # Use self-hosted runner for ATM stack installation (requires interactive desktop session)
    # Change to 'windows-latest' for GitHub-hosted runner (not recommended for APTRA installs)
    runs-on: windows-latest
 
    steps:
      - name: Checkout ndce-automation-tests
        uses: actions/checkout@v4
        #with:
        #  repository: ncratleos-swt-banking/ndce-automation-tests
        
          #ref: master
         # token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
 
      - name: Print deployment configuration
        shell: pwsh
        run: |
          Write-Host "========================================="
          Write-Host "  NDCe Stack Deployment Configuration"
          Write-Host "========================================="
          Write-Host "Runner OS              : $env:OS - $((Get-CimInstance Win32_OperatingSystem).Caption)"
          Write-Host "XFS Simulator          : $env:XFS_SIMULATOR_VERSION"
          Write-Host "APTRA Advance NDC      : $env:APTRA_ADVANCE_NDC_VERSION"
          Write-Host "APTRA NDC Patch Branch : $env:APTRA_ADVANCE_NDC_PATCH_BRANCH"
          Write-Host "EMV Version            : $env:EMV_VERSION"
          Write-Host "NDC Enterprise         : $env:NDC_ENTERPRISE_VERSION"
          Write-Host "Automation Base TARF   : $env:AUTOMATION_BASE_TARF_VERSION"
          Write-Host "Connections Server URL  : $env:CONNECTIONS_SERVER_URL"
          Write-Host "Project Type           : $env:PROJECT_TYPE"
          Write-Host "Automation NDCe Version: $env:AUTOMATION_NDC_ENTERPRISE_VERSION"
          Write-Host "========================================="
 
      # -----------------------------------------------------------
      # 0. Install Prerequisites (Chocolatey, 7zip, NuGet, VC++)
      # -----------------------------------------------------------
      - name: Install prerequisites
        shell: pwsh
        run: |
          Write-Host "=== Installing prerequisites ==="
          choco install 7zip -y --no-progress
          New-Item -ItemType Directory -Force -Path "C:\.ansible\Packages" | Out-Null
 
      # -----------------------------------------------------------
      # 1. Install NDCe Stack Components
      # -----------------------------------------------------------
 
      - name: Install XFS Simulator
        shell: pwsh
        run: |
          Write-Host "=== Downloading XFS Simulator $env:XFS_SIMULATOR_VERSION ==="
          $packageDir = "C:\.ansible\Packages"
          $installDir = "C:\.ansible\XFS Simulator"
          $nupkgFile = "XFSSimulator.$env:XFS_SIMULATOR_VERSION.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          curl.exe --fail -L `
            -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" `
            -o "$packageDir\$nupkgFile" `
            $url
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Download failed with exit code $LASTEXITCODE"
            exit 1
          }
          $fileSize = (Get-Item "$packageDir\$nupkgFile").Length
          Write-Host "Downloaded file size: $fileSize bytes"
          if ($fileSize -lt 1024) {
            Write-Host "ERROR: Downloaded file is too small — likely an error response"
            Get-Content "$packageDir\$nupkgFile"
            exit 1
          }
          Write-Host "=== Extracting XFS Simulator ==="
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Expand-Archive -Path "$packageDir\$nupkgFile" -DestinationPath $installDir -Force
          Write-Host "=== Extracted top-level contents (XFS Simulator) ==="
          Get-ChildItem -Path $installDir | Select-Object Name, Length, LastWriteTime | Format-Table -AutoSize
          Write-Host "=== Installing XFS Simulator (setup.exe /t:devsim /u:silent) ==="
          $proc = Start-Process `
            -FilePath "$installDir\setup.exe" `
            -ArgumentList "/t:devsim /u:silent" `
            -Wait `
            -PassThru
          $validCodes = @(0, 1073741825, 1073741826, 1073741830, 3010, 1641)
          if ($proc.ExitCode -notin $validCodes) {
            Write-Host "ERROR: XFS Simulator install failed with exit code $($proc.ExitCode)"
            exit 1
          }
          Write-Host "XFS Simulator installed (exit code: $($proc.ExitCode))"
          
          Write-Host "=============================================="
          Write-Host " Dynamically discovering XFS Simulator install location"
          Write-Host "=============================================="
          
          $uninstallRoots = @(
            "HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall",
            "HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall"
          )
          
          $xfsInstallations = @()
          
          foreach ($root in $uninstallRoots) {
            if (Test-Path $root) {
              Get-ChildItem $root | ForEach-Object {
                $props = Get-ItemProperty $_.PsPath -ErrorAction SilentlyContinue
                if ($props.DisplayName -and $props.DisplayName -match "XFS") {
                  $xfsInstallations += $props
                }
              }
            }
          }
          
          if ($xfsInstallations.Count -eq 0) {
            Write-Host "WARNING: No XFS-related product found in registry"
          } else {
            Write-Host "XFS-related products found in registry:"
            $xfsInstallations |
              Select-Object DisplayName, InstallLocation |
              Format-Table -AutoSize
          }
          
                    $simStart = Get-ChildItem `
            -Path "C:\" `
            -Filter "SIMSTART.exe" `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $simStart) {
            Write-Host "ERROR: SIMSTART.exe not found after installation"
            exit 1
          }
          Write-Host "SIMSTART.exe found:"
          Write-Host "Path : $($simStart.FullName)"
          Write-Host "Size : $([Math]::Round($simStart.Length / 1KB, 2)) KB"
          $versionInfo = (Get-Item $simStart.FullName).VersionInfo
          Write-Host "File version : $($versionInfo.FileVersion)"
          Write-Host "Product ver. : $($versionInfo.ProductVersion)"
          
      - name: Install APTRA Advance NDC
        shell: pwsh
        run: |
          Write-Host "=== Downloading APTRA Advance NDC $env:APTRA_ADVANCE_NDC_VERSION ==="
          $nupkgFile = "AdvanceNDC.$env:APTRA_ADVANCE_NDC_VERSION.nupkg"
          $url = "https://ncratleos.jfrog.io/artifactory/atmclient-nuget-releases/$nupkgFile"
      
          curl.exe --fail -L `
            -u "${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }}" `
            -o "C:\.ansible\Packages\$nupkgFile" `
            $url
      
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Download failed"
            exit 1
          }
      
          $fileSize = (Get-Item "C:\.ansible\Packages\$nupkgFile").Length
          Write-Host "Downloaded file size: $fileSize bytes"
      
          if ($fileSize -lt 1024) {
            Write-Host "ERROR: File too small ($fileSize bytes)"
            Get-Content "C:\.ansible\Packages\$nupkgFile"
            exit 1
          }
      
          Write-Host "=== Extracting Advance NDC ==="
          $extractPath = "C:\.ansible\Advance NDC $env:APTRA_ADVANCE_NDC_VERSION"
          New-Item -ItemType Directory -Force -Path $extractPath | Out-Null
          Expand-Archive -Path "C:\.ansible\Packages\$nupkgFile" -DestinationPath $extractPath -Force
      
          Write-Host "=== Extracted contents ==="
          Get-ChildItem -Path $extractPath -Recurse |
            Select-Object FullName, Length |
            Format-Table -AutoSize
      
          Write-Host "=== Installing Advance NDC (setup.exe /t:sst /u:silent) ==="
          Write-Host "Extract path: $extractPath"
          Write-Host "Setup.exe exists: $(Test-Path "$extractPath\setup.exe")"
          Write-Host "Start time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
      
          $proc = Start-Process `
            -FilePath "$extractPath\setup.exe" `
            -ArgumentList "/t:sst /u:silent" `
            -Wait `
            -PassThru `
            -RedirectStandardOutput "$extractPath\setup-stdout.log" `
            -RedirectStandardError "$extractPath\setup-stderr.log"
      
          Write-Host "End time: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          Write-Host "Exit code: $($proc.ExitCode)"
      
          if (Test-Path "$extractPath\setup-stdout.log") {
            Write-Host "=== setup stdout ==="
            Get-Content "$extractPath\setup-stdout.log"
          }
      
          if (Test-Path "$extractPath\setup-stderr.log") {
            Write-Host "=== setup stderr ==="
            Get-Content "$extractPath\setup-stderr.log"
          }
      
          Write-Host "=== Recent MsiInstaller events ==="
          Get-WinEvent `
            -FilterHashtable @{ LogName='Application'; ProviderName='MsiInstaller'; StartTime=(Get-Date).AddMinutes(-30) } `
            -MaxEvents 10 `
            -ErrorAction SilentlyContinue |
            Format-List TimeCreated, Message
      
          $validCodes = @(0,1073741825,1073741826,1073741830,3010,1641)
          if ($proc.ExitCode -notin $validCodes) {
            Write-Host "ERROR: Advance NDC install failed with exit code $($proc.ExitCode)"
            exit 1
          }
      
          Write-Host "Advance NDC installed successfully (exit code: $($proc.ExitCode))"
      
          # ============================================================
          # DYNAMIC INSTALL DIRECTORY & EXE DISCOVERY (ADDED PART)
          # ============================================================
      
          Write-Host "=============================================="
          Write-Host " Dynamically discovering Advance NDC install location"
          Write-Host "=============================================="
      
          # Find ANY Advance NDC executable dynamically
          $andcExe = Get-ChildItem `
            -Path "C:\" `
            -Filter "*.exe" `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Where-Object {
              $_.Name -match "andc|ndc|Advance"
            } |
            Select-Object -First 1
      
          if (-not $andcExe) {
            Write-Host "ERROR: No Advance NDC executable found after installation"
            exit 1
          }
      
          Write-Host "Advance NDC executable found:"
          Write-Host "Path : $($andcExe.FullName)"
          Write-Host "Size : $([Math]::Round($andcExe.Length / 1KB, 2)) KB"
      
          $ver = (Get-Item $andcExe.FullName).VersionInfo
          Write-Host "File version : $($ver.FileVersion)"
          Write-Host "Product ver. : $($ver.ProductVersion)"
      
          # Derive the installation directory dynamically
          $andcInstallDir = $andcExe.Directory.Parent
      
          Write-Host "=============================================="
          Write-Host " Checking install directory: $($andcInstallDir.FullName)"
          Write-Host "=============================================="
          Write-Host ""
      
          # Native PowerShell directory output
          Get-Item $andcInstallDir.FullName
      
       
                  
      
       
           
      
